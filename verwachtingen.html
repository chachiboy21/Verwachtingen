<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verwachtingen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f3;
    padding: 2rem 1.5rem;
    color: #1a1a1a;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 1.5rem;
    letter-spacing: -0.01em;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
  }

  .card {
    background: #ffffff;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #e0e0dc;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    border-color: #c0c0bb;
  }

  .card-header {
    background: #0F6E56;
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    user-select: none;
  }

  .card-num {
    font-size: 11px;
    font-weight: 600;
    color: #5DCAA5;
    min-width: 16px;
    padding-top: 2px;
    letter-spacing: 0.03em;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #E1F5EE;
    flex: 1;
    line-height: 1.4;
  }

  .chevron {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: transform 0.25s ease;
    color: #5DCAA5;
  }

  .card.open .chevron {
    transform: rotate(180deg);
  }

  .card-body {
    display: none;
    padding: 16px;
    border-top: 1px solid #e8e8e4;
    animation: fadeIn 0.2s ease;
  }

  .card.open .card-body {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #0F6E56;
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 13px;
    color: #333;
    line-height: 1.65;
    margin-bottom: 14px;
  }

  .card-bullets {
    list-style: none;
    border-top: 1px solid #ececea;
    padding-top: 12px;
  }

  .card-bullets li {
    font-size: 13px;
    color: #555;
    line-height: 1.55;
    padding: 5px 0 5px 16px;
    position: relative;
  }

  .card-bullets li::before {
    content: "›";
    position: absolute;
    left: 0;
    color: #0F6E56;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
  }

  .hint {
    font-size: 12px;
    color: #999;
    margin-top: 1.2rem;
    text-align: right;
  }
</style>
</head>
